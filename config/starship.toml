add_newline = false
format = '$all${env_var.YEAR}$time$character'

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[V](bold green)"

[env_var.https_proxy]
format = "with 🛜 [$env_value](red bold dimmed) "

[env_var.YEAR]
format = "[$env_value](bold) "

[time]
disabled = false
format = '[$time]($style) '
time_format = '%H:%M'

[hostname]
ssh_only = false
format = '[\[](bold red dimmed)[$ssh_symbol](bold blue)[$hostname](bold red dimmed)[\]](bold red dimmed) '
disabled = false

[container]
disabled = true
